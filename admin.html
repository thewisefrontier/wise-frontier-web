<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TWF Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0f0f0f; --bg2: #161616; --bg3: #1e1e1e;
      --border: #2a2a2a; --text: #e8e0d0; --muted: #666;
      --accent: #c8a060; --accent2: #6090c8;
      --danger: #c85050; --success: #50c878;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; min-height: 100vh; }

    /* 로그인 */
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: var(--bg2); border: 1px solid var(--border); padding: 40px; width: 400px; }
    .login-title { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--accent); margin-bottom: 8px; }
    .login-sub { font-size: 11px; color: var(--muted); margin-bottom: 24px; }
    .login-box input {
      width: 100%; padding: 10px 14px; background: var(--bg3);
      border: 1px solid var(--border); color: var(--text);
      font-family: 'IBM Plex Mono', monospace; font-size: 13px;
      margin-bottom: 12px; outline: none;
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-error { font-size: 11px; color: var(--danger); margin-bottom: 12px; display: none; }

    .btn {
      padding: 10px 20px; font-family: 'IBM Plex Mono', monospace;
      font-size: 12px; font-weight: 700; cursor: pointer;
      border: none; transition: all 0.2s; letter-spacing: 0.05em;
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { background: #e0b870; }
    .btn-danger { background: var(--danger); color: #fff; font-size: 11px; padding: 5px 12px; }
    .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-full { width: 100%; }

    /* 메인 */
    #app { display: none; }
    .header {
      background: var(--bg2); border-bottom: 2px solid var(--accent);
      padding: 12px 24px; display: flex; align-items: center; justify-content: space-between;
    }
    .header-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--accent); }
    .header-user { font-size: 11px; color: var(--muted); }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    .container { display: grid; grid-template-columns: 200px 1fr; min-height: calc(100vh - 49px); }
    .sidebar { background: var(--bg2); border-right: 1px solid var(--border); padding: 16px 0; }
    .sidebar-item {
      padding: 9px 16px; font-size: 12px; color: var(--muted);
      cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s;
    }
    .sidebar-item:hover { color: var(--text); background: var(--bg3); }
    .sidebar-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--bg3); }
    .sidebar-divider { height: 1px; background: var(--border); margin: 8px 0; }

    .main { padding: 20px; overflow-y: auto; }
    .toolbar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
    .toolbar input, .toolbar select {
      padding: 7px 10px; background: var(--bg2); border: 1px solid var(--border);
      color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 12px; outline: none;
    }
    .toolbar input:focus, .toolbar select:focus { border-color: var(--accent); }
    .toolbar input { flex: 1; min-width: 180px; }

    .article-table { width: 100%; border-collapse: collapse; }
    .article-table th {
      text-align: left; padding: 8px 10px; font-size: 11px; color: var(--muted);
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    .article-table td { padding: 8px 10px; font-size: 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .article-table tr:hover td { background: var(--bg3); }
    .article-title-text {
      color: var(--text); cursor: pointer; display: block;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 360px;
    }
    .article-title-text:hover { color: var(--accent); }
    .tag { display: inline-block; padding: 1px 5px; font-size: 10px; background: var(--bg3); border: 1px solid var(--border); margin-right: 3px; }
    .tag-own { border-color: var(--accent); color: var(--accent); }
    .muted { color: var(--muted); font-size: 11px; white-space: nowrap; }
    .actions { display: flex; gap: 4px; }
    .btn-sm { padding: 3px 8px; font-size: 10px; font-family: 'IBM Plex Mono', monospace; cursor: pointer; border: 1px solid var(--border); background: var(--bg3); color: var(--muted); }
    .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm-danger { border-color: var(--danger); color: var(--danger); }
    .btn-sm-danger:hover { background: var(--danger); color: #fff; }

    /* 편집 패널 */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 99; }
    .overlay.open { display: block; }
    .edit-panel {
      display: none; position: fixed; top: 0; right: 0; width: 580px;
      height: 100vh; background: var(--bg2); border-left: 1px solid var(--border);
      z-index: 100; flex-direction: column;
    }
    .edit-panel.open { display: flex; }
    .edit-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .edit-title-label { font-size: 13px; font-weight: 700; color: var(--accent); }
    .edit-body { padding: 18px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .field-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .field-input, .field-textarea, .field-select {
      width: 100%; padding: 8px 10px; background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 12px; outline: none;
    }
    .field-input:focus, .field-textarea:focus, .field-select:focus { border-color: var(--accent); }
    .field-textarea { resize: vertical; min-height: 220px; line-height: 1.7; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .edit-footer { padding: 14px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

    /* 사용자 관리 */
    .user-table { width: 100%; border-collapse: collapse; }
    .user-table th { text-align: left; padding: 8px 10px; font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border); }
    .user-table td { padding: 8px 10px; font-size: 12px; border-bottom: 1px solid var(--border); }
    .role-badge { padding: 2px 8px; font-size: 10px; font-weight: 700; }
    .role-admin { background: var(--accent); color: #000; }
    .role-reporter { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }

    .pagination { display: flex; gap: 4px; margin-top: 14px; justify-content: center; }
    .page-btn { padding: 5px 10px; background: var(--bg2); border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
    .page-btn:hover, .page-btn.active { border-color: var(--accent); color: var(--accent); }

    .toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 18px; background: var(--bg2); border: 1px solid var(--border); font-size: 12px; z-index: 200; display: none; }
    .toast.show { display: block; animation: fadeIn 0.2s; }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--danger); color: var(--danger); }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; } }
    .empty { text-align: center; padding: 50px; color: var(--muted); font-size: 13px; }
    .loading { text-align: center; padding: 30px; color: var(--muted); }

    /* 사용자 관리 섹션 - admin만 표시 */
    .admin-only { display: none; }
  </style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">TWF Admin</div>
    <div class="login-sub">The Wise Frontier 편집 시스템</div>
    <div class="login-error" id="login-error"></div>
    <input type="email" id="login-email" placeholder="이메일" onkeydown="if(event.key==='Enter')login()" />
    <input type="password" id="login-pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')login()" />
    <button class="btn btn-primary btn-full" onclick="login()">로그인</button>
  </div>
</div>

<!-- 앱 -->
<div id="app">
  <div class="overlay" id="overlay" onclick="closeEdit()"></div>

  <div class="header">
    <div class="header-title">✦ TWF Admin</div>
    <div class="header-actions">
      <span class="header-user" id="header-user"></span>
      <button class="btn btn-primary" style="font-size:11px;padding:7px 14px;" onclick="openNew()">+ 새 기사</button>
      <button class="btn btn-secondary" style="font-size:11px;padding:7px 14px;" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div class="container">
    <div class="sidebar">
      <div class="sidebar-item active" onclick="showArticles('all',this)">📰 전체 기사</div>
      <div class="sidebar-item" onclick="showArticles('own',this)">✦ TWF 자체 기사</div>
      <div class="sidebar-item" onclick="showArticles('cluster',this)">🔥 이슈</div>
      <div class="sidebar-item" onclick="showArticles('rss',this)">📡 RSS 기사</div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-item admin-only" id="user-menu" onclick="showUsers(this)">👥 사용자 관리</div>
    </div>

    <div class="main" id="main-content">
      <div class="loading">로딩 중...</div>
    </div>
  </div>

  <!-- 편집 패널 -->
  <div class="edit-panel" id="edit-panel">
    <div class="edit-header">
      <div class="edit-title-label" id="edit-panel-title">기사 편집</div>
      <button class="btn-sm" onclick="closeEdit()">✕ 닫기</button>
    </div>
    <div class="edit-body">
      <input type="hidden" id="edit-id" />
      <div>
        <div class="field-label">제목</div>
        <input class="field-input" id="edit-title-ko" type="text" placeholder="기사 제목" />
      </div>
      <div>
        <div class="field-label">본문</div>
        <textarea class="field-textarea" id="edit-summary-ko" placeholder="기사 본문..."></textarea>
      </div>
      <div class="field-row">
        <div>
          <div class="field-label">카테고리</div>
          <select class="field-select" id="edit-category">
            <option value="">선택</option>
            <option value="경제">경제</option>
            <option value="금융/증권">금융/증권</option>
            <option value="자원/에너지">자원/에너지</option>
            <option value="산업/기업">산업/기업</option>
            <option value="정치">정치</option>
            <option value="사회">사회</option>
            <option value="IT·과학">IT·과학</option>
            <option value="글로벌경제">글로벌경제</option>
            <option value="브리핑">브리핑</option>
            <option value="종합">종합</option>
          </select>
        </div>
        <div>
          <div class="field-label">지역</div>
          <select class="field-select" id="edit-region">
            <option value="">선택</option>
            <option value="africa">아프리카</option>
            <option value="southeast_asia">동남아시아</option>
            <option value="eastern_europe">동유럽</option>
            <option value="middle_east">중동</option>
            <option value="central_asia">중앙아시아</option>
            <option value="south_asia">남아시아</option>
            <option value="latin_america">라틴아메리카</option>
            <option value="caribbean">카리브해</option>
            <option value="oceania">오세아니아</option>
            <option value="global">글로벌</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div>
          <div class="field-label">국가</div>
          <input class="field-select" id="edit-country" type="text" placeholder="예: 나이지리아" />
        </div>
        <div>
          <div class="field-label">출처</div>
          <input class="field-select" id="edit-source" type="text" placeholder="The Wise Frontier" />
        </div>
      </div>
      <div>
        <div class="field-label">원문 URL</div>
        <input class="field-input" id="edit-url" type="text" placeholder="https://..." />
      </div>
    </div>
    <div class="edit-footer">
      <button class="btn-sm btn-sm-danger admin-only" id="delete-btn" onclick="deleteArticle()">삭제</button>
      <button class="btn btn-secondary" style="font-size:11px;" onclick="closeEdit()">취소</button>
      <button class="btn btn-primary" style="font-size:11px;" onclick="saveArticle()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // Supabase 설정 — 여기에 프로젝트 정보 입력
  const SUPABASE_URL = 'https://fotdngseksqaghvtcvqh.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_rT3kSEAAdM0DJlDW5fEWww_M37h6dDW'; // anon public key 입력

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;
  let currentRole = null;
  let currentFilter = 'all';
  let currentPage = 0;
  let pageSize = 30;
  let searchTimer = null;
  let isNew = false;
  let currentSection = 'articles';

  // ── 인증 ─────────────────────────────────────────────

  async function login() {
    const email = document.getElementById('login-email').value.trim();
    const pw = document.getElementById('login-pw').value;
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';

    const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
    if (error) {
      errEl.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
      errEl.style.display = 'block';
      return;
    }
    await initApp(data.user);
  }

  async function initApp(user) {
    currentUser = user;

    // 역할 조회
    const { data: roleData } = await sb.from('user_roles').select('role,name').eq('id', user.id).single();
    currentRole = roleData?.role || 'reporter';
    const userName = roleData?.name || user.email;

    document.getElementById('header-user').textContent = `${userName} (${currentRole === 'admin' ? '관리자' : '기자'})`;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    // 관리자 전용 UI 표시
    if (currentRole === 'admin') {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
    }

    loadArticles();
  }

  async function logout() {
    await sb.auth.signOut();
    location.reload();
  }

  // 자동 로그인
  window.onload = async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) await initApp(session.user);
  };

  // ── 기사 목록 ─────────────────────────────────────────

  function showArticles(filter, el) {
    currentSection = 'articles';
    currentFilter = filter;
    currentPage = 0;
    document.querySelectorAll('.sidebar-item').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    loadArticles();
  }

  async function loadArticles() {
    document.getElementById('main-content').innerHTML = '<div class="loading">로딩 중...</div>';

    let query = sb.from('articles')
      .select('id,title_ko,title_en,source,category,country,region,created_at,subcategory', { count: 'exact' })
      .order('created_at', { ascending: false })
      .range(currentPage * pageSize, (currentPage + 1) * pageSize - 1);

    if (currentFilter === 'own') query = query.eq('source', 'The Wise Frontier');
    else if (currentFilter === 'rss') query = query.neq('source', 'The Wise Frontier');
    else if (currentFilter === 'cluster') query = query.eq('source', 'The Wise Frontier').like('subcategory', 'cluster_%');

    const searchQ = document.getElementById('search-input')?.value?.trim();
    if (searchQ) query = query.or(`title_ko.ilike.%${searchQ}%,title_en.ilike.%${searchQ}%,country.ilike.%${searchQ}%,source.ilike.%${searchQ}%`);

    const region = document.getElementById('filter-region')?.value;
    const category = document.getElementById('filter-category')?.value;
    if (region) query = query.eq('region', region);
    if (category) query = query.eq('category', category);

    const { data, count, error } = await query;
    if (error) { document.getElementById('main-content').innerHTML = `<div class="empty">오류: ${error.message}</div>`; return; }
    renderArticles(data, count);
  }

  function renderArticles(articles, total) {
    const toolbar = `
      <div class="toolbar">
        <input type="text" id="search-input" placeholder="🔍 제목, 국가, 출처 검색..." oninput="onSearch()" />
        <select id="filter-region" onchange="loadArticles()">
          <option value="">전체 지역</option>
          <option value="africa">아프리카</option>
          <option value="southeast_asia">동남아시아</option>
          <option value="eastern_europe">동유럽</option>
          <option value="middle_east">중동</option>
          <option value="central_asia">중앙아시아</option>
        </select>
        <select id="filter-category" onchange="loadArticles()">
          <option value="">전체 분야</option>
          <option value="경제">경제</option>
          <option value="금융/증권">금융/증권</option>
          <option value="자원/에너지">자원/에너지</option>
          <option value="산업/기업">산업/기업</option>
          <option value="정치">정치</option>
          <option value="사회">사회</option>
        </select>
        <span style="font-size:11px;color:var(--muted);margin-left:auto;">총 ${total}건</span>
      </div>
    `;

    if (!articles?.length) {
      document.getElementById('main-content').innerHTML = toolbar + '<div class="empty">기사 없음</div>';
      return;
    }

    const rows = articles.map(a => {
      const isOwn = a.source === 'The Wise Frontier';
      const title = a.title_ko || a.title_en || '(제목없음)';
      const date = (a.created_at || '').slice(0, 10);
      return `
        <tr>
          <td style="max-width:380px;">
            ${isOwn ? '<span class="tag tag-own">✦</span>' : ''}
            <span class="article-title-text" onclick="openEdit(${a.id})" title="${title.replace(/"/g,'&quot;')}">${title}</span>
          </td>
          <td class="muted">${a.source || ''}</td>
          <td><span class="tag">${a.category || ''}</span></td>
          <td class="muted">${a.country || ''}</td>
          <td class="muted">${date}</td>
          <td class="actions">
            <button class="btn-sm" onclick="openEdit(${a.id})">편집</button>
            ${currentRole === 'admin' ? `<button class="btn-sm btn-sm-danger" onclick="confirmDelete(${a.id})">삭제</button>` : ''}
          </td>
        </tr>
      `;
    }).join('');

    const table = `
      <table class="article-table">
        <thead><tr>
          <th>제목</th><th>출처</th><th>분야</th><th>국가</th><th>날짜</th><th>관리</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;

    const totalPages = Math.ceil(total / pageSize);
    let pagination = '';
    if (totalPages > 1) {
      const start = Math.max(0, currentPage - 2);
      const end = Math.min(totalPages - 1, currentPage + 2);
      pagination = '<div class="pagination">';
      if (start > 0) pagination += `<button class="page-btn" onclick="goPage(0)">1</button><span style="color:var(--muted);padding:0 4px">…</span>`;
      for (let i = start; i <= end; i++) pagination += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i+1}</button>`;
      if (end < totalPages-1) pagination += `<span style="color:var(--muted);padding:0 4px">…</span><button class="page-btn" onclick="goPage(${totalPages-1})">${totalPages}</button>`;
      pagination += '</div>';
    }

    document.getElementById('main-content').innerHTML = toolbar + table + pagination;
  }

  function onSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { currentPage = 0; loadArticles(); }, 300);
  }

  function goPage(p) { currentPage = p; loadArticles(); window.scrollTo(0,0); }

  // ── 편집 ─────────────────────────────────────────────

  async function openEdit(id) {
    isNew = false;
    document.getElementById('edit-panel-title').textContent = '기사 편집';

    const { data, error } = await sb.from('articles').select('*').eq('id', id).single();
    if (error || !data) return;

    document.getElementById('edit-id').value = data.id;
    document.getElementById('edit-title-ko').value = data.title_ko || '';
    document.getElementById('edit-summary-ko').value = data.summary_ko || '';
    document.getElementById('edit-category').value = data.category || '';
    document.getElementById('edit-region').value = data.region || '';
    document.getElementById('edit-country').value = data.country || '';
    document.getElementById('edit-source').value = data.source || '';
    document.getElementById('edit-url').value = data.url || '';

    document.getElementById('edit-panel').classList.add('open');
    document.getElementById('overlay').classList.add('open');
  }

  function openNew() {
    isNew = true;
    document.getElementById('edit-panel-title').textContent = '새 기사 작성';
    ['edit-id','edit-title-ko','edit-summary-ko','edit-country','edit-url'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('edit-category').value = '';
    document.getElementById('edit-region').value = '';
    document.getElementById('edit-source').value = 'The Wise Frontier';
    document.getElementById('edit-panel').classList.add('open');
    document.getElementById('overlay').classList.add('open');
  }

  function closeEdit() {
    document.getElementById('edit-panel').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }

  async function saveArticle() {
    const payload = {
      title_ko: document.getElementById('edit-title-ko').value,
      title_en: document.getElementById('edit-title-ko').value,
      summary_ko: document.getElementById('edit-summary-ko').value,
      category: document.getElementById('edit-category').value,
      region: document.getElementById('edit-region').value,
      country: document.getElementById('edit-country').value,
      source: document.getElementById('edit-source').value,
      url: document.getElementById('edit-url').value,
    };

    if (isNew) {
      if (!payload.url) payload.url = `internal://manual/${Date.now()}`;
      payload.sent_telegram = 1;
      payload.score = 100;
      payload.created_at = new Date().toISOString().slice(0,16).replace('T',' ');
      const { error } = await sb.from('articles').insert(payload);
      if (error) { toast(`오류: ${error.message}`, 'error'); return; }
      toast('기사가 등록됐습니다', 'success');
    } else {
      const id = document.getElementById('edit-id').value;
      const { error } = await sb.from('articles').update(payload).eq('id', id);
      if (error) { toast(`오류: ${error.message}`, 'error'); return; }
      toast('저장됐습니다', 'success');
    }
    closeEdit();
    loadArticles();
  }

  async function confirmDelete(id) {
    if (currentRole !== 'admin') { toast('관리자만 삭제할 수 있습니다', 'error'); return; }
    if (!confirm('이 기사를 삭제하시겠습니까?')) return;
    const { error } = await sb.from('articles').delete().eq('id', id);
    if (error) { toast(`삭제 실패: ${error.message}`, 'error'); return; }
    toast('삭제됐습니다', 'success');
    loadArticles();
  }

  async function deleteArticle() {
    const id = document.getElementById('edit-id').value;
    if (!id || currentRole !== 'admin') return;
    if (!confirm('이 기사를 삭제하시겠습니까?')) return;
    const { error } = await sb.from('articles').delete().eq('id', id);
    if (error) { toast(`삭제 실패: ${error.message}`, 'error'); return; }
    toast('삭제됐습니다', 'success');
    closeEdit();
    loadArticles();
  }

  // ── 사용자 관리 (관리자 전용) ─────────────────────────

  async function showUsers(el) {
    if (currentRole !== 'admin') return;
    currentSection = 'users';
    document.querySelectorAll('.sidebar-item').forEach(e => e.classList.remove('active'));
    el.classList.add('active');

    document.getElementById('main-content').innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <span style="font-size:13px;font-weight:700;">사용자 관리</span>
        <button class="btn btn-primary" style="font-size:11px;" onclick="openAddUser()">+ 사용자 초대</button>
      </div>
      <div id="user-list"><div class="loading">로딩 중...</div></div>
    `;

    const { data, error } = await sb.from('user_roles').select('*').order('created_at');
    if (error) { document.getElementById('user-list').innerHTML = `<div class="empty">오류: ${error.message}</div>`; return; }

    const rows = data.map(u => `
      <tr>
        <td>${u.name || '-'}</td>
        <td>${u.email}</td>
        <td><span class="role-badge ${u.role === 'admin' ? 'role-admin' : 'role-reporter'}">${u.role === 'admin' ? '관리자' : '기자'}</span></td>
        <td class="muted">${(u.created_at || '').slice(0,10)}</td>
        <td>
          ${u.id !== currentUser.id ? `
            <button class="btn-sm" onclick="toggleRole('${u.id}','${u.role}')">역할 변경</button>
            <button class="btn-sm btn-sm-danger" onclick="removeUser('${u.id}')">삭제</button>
          ` : '<span class="muted">(본인)</span>'}
        </td>
      </tr>
    `).join('');

    document.getElementById('user-list').innerHTML = `
      <table class="user-table">
        <thead><tr><th>이름</th><th>이메일</th><th>역할</th><th>가입일</th><th>관리</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  async function toggleRole(id, currentRoleVal) {
    const newRole = currentRoleVal === 'admin' ? 'reporter' : 'admin';
    if (!confirm(`역할을 ${newRole === 'admin' ? '관리자' : '기자'}로 변경하시겠습니까?`)) return;
    const { error } = await sb.from('user_roles').update({ role: newRole }).eq('id', id);
    if (error) { toast(`오류: ${error.message}`, 'error'); return; }
    toast('역할이 변경됐습니다', 'success');
    showUsers(document.getElementById('user-menu'));
  }

  async function removeUser(id) {
    if (!confirm('이 사용자를 삭제하시겠습니까?')) return;
    const { error } = await sb.from('user_roles').delete().eq('id', id);
    if (error) { toast(`오류: ${error.message}`, 'error'); return; }
    toast('삭제됐습니다', 'success');
    showUsers(document.getElementById('user-menu'));
  }

  function openAddUser() {
    const email = prompt('초대할 이메일 주소:');
    if (!email) return;
    const name = prompt('이름:');
    const role = confirm('관리자 권한을 부여하시겠습니까?\n(확인: 관리자, 취소: 기자)') ? 'admin' : 'reporter';
    toast(`${email} 초대 링크를 Supabase Auth에서 직접 발송해주세요.\n역할: ${role === 'admin' ? '관리자' : '기자'}`, 'success');
  }

  // ── 토스트 ────────────────────────────────────────────

  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast show ${type}`;
    setTimeout(() => el.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
