<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NewsFinal — 프론티어 미디어">
  <meta property="og:type" content="article">
  <meta property="og:title" content="NewsFinal">
  <meta property="og:description" content="">
  <link rel="canonical" href="https://newsfinal.co.kr/article.html">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7TKGYEM467"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "G-7TKGYEM467");
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <title>NewsFinal</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8; --bg2: #fff; --bg3: #f0ebe0;
      --border: #d8d0c0; --text: #1a1a1a; --muted: #888;
      --accent: #8b5a2b; --accent2: #2b5a8b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: Georgia, serif; line-height: 1.7; }

    /* 헤더 */
    .site-header {
      background: var(--bg2); border-bottom: 3px double var(--text);
      padding: 16px 0; text-align: center;
    }
    .site-logo { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: var(--text); text-decoration: none; }
    .site-logo span { color: var(--accent); }
    .site-nav { margin-top: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }
    .site-nav a { color: var(--muted); text-decoration: none; margin: 0 8px; }
    .site-nav a:hover { color: var(--accent); }

    /* 기사 레이아웃 */
    .article-wrapper {
      max-width: 720px; margin: 40px auto; padding: 0 20px;
    }

    /* 기사 메타 */
    .article-meta {
      font-family: 'IBM Plex Mono', monospace; font-size: 11px;
      color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap;
      margin-bottom: 16px; padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .article-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .tag {
      display: inline-block; padding: 3px 8px; font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; border: 1px solid var(--border); color: var(--muted);
      text-decoration: none;
    }
    .tag-own { border-color: var(--accent); color: var(--accent); font-weight: 700; }
    .tag:hover { border-color: var(--accent); color: var(--accent); }

    /* 기사 제목 */
    .article-title {
      font-family: 'Playfair Display', serif; font-size: 32px;
      font-weight: 700; line-height: 1.3; margin-bottom: 20px; color: var(--text);
    }

    /* 기사 본문 */
    .article-body {
      font-size: 16px; line-height: 1.9; color: var(--text);
    }
    .article-body p { margin-bottom: 20px; }

    /* 자체기사 표시 */
    .own-badge {
      display: inline-block; background: var(--accent); color: #fff;
      font-family: 'IBM Plex Mono', monospace; font-size: 10px;
      font-weight: 700; padding: 3px 8px; margin-bottom: 12px;
    }

    /* 원문 링크 */
    .source-link {
      margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--border);
      font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted);
    }
    .source-link a {
      color: var(--accent); text-decoration: none;
    }
    .source-link a:hover { text-decoration: underline; }

    /* 관련 기사 */
    .related { margin-top: 48px; padding-top: 24px; border-top: 2px solid var(--text); }
    .related-title { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 16px; }
    .related-item {
      padding: 12px 0; border-bottom: 1px solid var(--border);
      display: flex; gap: 12px; align-items: flex-start;
    }
    .related-item:last-child { border-bottom: none; }
    .related-item-title { font-size: 14px; color: var(--text); text-decoration: none; cursor: pointer; }
    .related-item-title:hover { color: var(--accent); }
    .related-meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 4px; }

    /* 뒤로가기 */
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'IBM Plex Mono', monospace; font-size: 11px;
      color: var(--muted); text-decoration: none; margin-bottom: 24px;
    }
    .back-btn:hover { color: var(--accent); }

    /* 푸터 */
    .site-footer {
      margin-top: 60px; padding: 20px; text-align: center;
      border-top: 1px solid var(--border);
      font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted);
    }

    .loading { text-align: center; padding: 60px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
    .error { text-align: center; padding: 60px; color: #c85050; font-family: 'IBM Plex Mono', monospace; }
  </style>
</head>
<body>

<header class="site-header">
  <a href="/" class="site-logo">News<span>Final</span></a>
  <div class="site-nav">
    <a href="/">홈</a> ·
    <a href="/?category=경제">경제</a> ·
    <a href="/?category=금융">금융</a> ·
    <a href="/?category=자원·에너지">자원·에너지</a> ·
    <a href="/?category=산업·기업">산업·기업</a> ·
    <a href="/?category=정치·외교">정치·외교</a> ·
    <a href="/?category=사회">사회</a> ·
    <a href="/?category=IT·과학">IT·과학</a>
  </div>
</header>

<div class="article-wrapper" id="article-wrapper">
  <div class="loading">기사를 불러오는 중...</div>
</div>

<footer class="site-footer">
  NEWSFINAL © 2026
</footer>

<script>
  const REGION_KO = {
    'africa': '아프리카', 'southeast_asia': '동남아시아',
    'eastern_europe': '동유럽', 'middle_east': '중동',
    'central_asia': '중앙아시아', 'south_asia': '남아시아',
    'latin_america': '라틴아메리카', 'caribbean': '카리브해',
    'oceania': '오세아니아', 'global': '글로벌',
    'east_africa': '동아프리카', 'west_africa': '서아프리카',
    'north_africa': '북아프리카', 'southern_africa': '남아프리카',
  };
  function regionKo(r) { return REGION_KO[r] || r || ''; }
  function cleanBody(text) {
    if (!text) return '';
    text = text
      .replace(/\*\*(.+?)\*\*/g, '$1')
      .replace(/\*(.+?)\*/g, '$1')
      .replace(/^#{1,6}\s+/gm, '')
      .replace(/\[.{1,20}=.{1,30}\]/g, '')
      .replace(/^\[.{1,30}\]\s*/gm, '');
    const promoPatterns = [
      /[^.]*텔레그램 채널[^.]*\./g,
      /[^.]*구독[^.]*프리미엄[^.]*\./g,
      /[^.]*ET Prime[^.]*\./g,
      /[^.]*뉴스레터[^.]*구독[^.]*\./g,
      /[^.]*앱[^.]*다운로드[^.]*\./g,
      /[^.]*더 많은 정보[^.]*방문[^.]*\./g,
    ];
    promoPatterns.forEach(p => { text = text.replace(p, ''); });
    return text.trim();
  }

  async function loadArticle() {
    const params = new URLSearchParams(location.search);
    const id = params.get('id');

    if (!id) {
      document.getElementById('article-wrapper').innerHTML = '<div class="error">기사를 찾을 수 없습니다.</div>';
      return;
    }

    try {
      const res = await fetch('data/articles.json');
      const articles = await res.json();
      const article = articles.find(a => String(a.id) === String(id));

      if (!article) {
        document.getElementById('article-wrapper').innerHTML = '<div class="error">기사를 찾을 수 없습니다.</div>';
        return;
      }

      renderArticle(article, articles);

      // view_count 증가
      fetch(`https://fotdngseksqaghvtcvqh.supabase.co/rest/v1/rpc/increment_view_count`, {
        method: 'POST',
        headers: {
          'apikey': 'sb_publishable_rT3kSEAAdM0DJlDW5fEWww_M37h6dDW',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ article_id: parseInt(id) })
      }).catch(() => {});

    } catch(e) {
      document.getElementById('article-wrapper').innerHTML = '<div class="error">오류가 발생했습니다.</div>';
    }
  }

  function formatDate(str) {
    if (!str) return '';
    const d = new Date(str.replace(' ', 'T'));
    return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function renderArticle(a, allArticles) {
    const isOwn = a.source === 'NewsFinal';
    const title = a.title_ko || a.title_en || '';
    const body = cleanBody(a.summary_ko || a.summary_en || '');
    const bodyHtml = body
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')  // **굵게**
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>');

    // 관련 기사 — 같은 카테고리 또는 같은 지역, 최신순 4개
    const related = allArticles
      .filter(r => r.id !== a.id && r.source === 'NewsFinal' &&
        (r.category === a.category || r.region === a.region))
      .sort((x, y) => (y.created_at || '').localeCompare(x.created_at || ''))
      .slice(0, 4);

    // 메타 태그 업데이트
    document.title = `${title} — NewsFinal`;
    document.querySelector('meta[name="description"]')?.setAttribute('content', cleanBody(a.summary_ko || '').slice(0, 150));
    document.querySelector('meta[property="og:title"]')?.setAttribute('content', `${title} — NewsFinal`);
    document.querySelector('meta[property="og:description"]')?.setAttribute('content', cleanBody(a.summary_ko || '').slice(0, 150));
    document.querySelector('link[rel="canonical"]')?.setAttribute('href', `https://newsfinal.co.kr/article.html?id=${a.id}`);

    document.getElementById('article-wrapper').innerHTML = `
      <a class="back-btn" href="/">← 홈으로</a>

      <div class="article-tags">
        ${a.category ? `<a class="tag" href="/?category=${encodeURIComponent(a.category)}">${a.category}</a>` : ''}
        ${a.subcategory && a.subcategory !== a.category
          && !a.subcategory.startsWith('cluster_')
          && !a.subcategory.startsWith('solo_')
          && !a.subcategory.endsWith('briefing')
          ? `<span class="tag">${a.subcategory}</span>` : ''}
        ${a.region ? `<span class="tag">${regionKo(a.region)}</span>` : ''}
        ${a.countries && a.countries.length > 0
          ? a.countries.map(c => `<a class="tag" href="/?country=${encodeURIComponent(c)}">${c}</a>`).join('')
          : (a.country ? `<a class="tag" href="/?country=${encodeURIComponent(a.country)}">${a.country}</a>` : '')}
      </div>

      <h1 class="article-title">${title}</h1>

      <div class="article-meta">
        <span>🕐 ${formatDate(a.created_at)}</span>
        ${a.region ? `<span>🌍 ${regionKo(a.region)}</span>` : ''}
        ${a.country ? `<span>📍 ${a.country}</span>` : ''}
      </div>

      <div class="article-body">
        <p>${bodyHtml}</p>
      </div>

      <div class="source-link">ⓒ NewsFinal</div>

      ${related.length ? `
        <div class="related">
          <div class="related-title">관련 기사</div>
          ${related.map(r => `
            <div class="related-item">
              <div>
                <a class="related-item-title" href="/article.html?id=${r.id}">${r.title_ko || r.title_en}</a>
                <div class="related-meta">NewsFinal · ${(r.created_at || '').slice(0,10)}</div>
              </div>
            </div>
          `).join('')}
        </div>
      ` : ''}
    `;
  }

  loadArticle();
</script>
</body>
</html>
