<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <meta name="description" content="NewsFinal 경제 일정 — 프론티어 마켓 주요국 중앙은행 회의, 선거, 경제지표 발표 일정">
  <title>경제 일정 — NewsFinal</title>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7TKGYEM467"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7TKGYEM467');
  </script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8; --bg2: #fff; --bg3: #faf6f0; --text: #1a1a1a; --muted: #777;
      --accent: #8b5a2b; --accent2: #5a7a8c; --border: #d8d0c0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: Georgia, serif; line-height: 1.6; }

    .header { background: var(--bg2); border-bottom: 3px double var(--text); padding: 16px 0; text-align: center; }
    .logo { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; text-decoration: none; color: var(--text); }
    .logo span { color: var(--accent); }
    .nav { margin-top: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
    .nav a { color: var(--muted); text-decoration: none; margin: 0 8px; }
    .nav a:hover { color: var(--accent); }

    .container { max-width: 800px; margin: 0 auto; padding: 32px 20px; }

    h1 { font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 6px; }
    .sub { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 24px; }

    .filters {
      display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;
      font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    }
    .filters select {
      padding: 7px 10px; border: 1px solid var(--border); background: var(--bg2);
      color: var(--text); font-family: inherit; font-size: 12px;
    }
    .filters label { display: flex; align-items: center; gap: 5px; cursor: pointer; }

    .day-group { margin-bottom: 22px; }
    .day-header {
      font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 700;
      color: var(--text); padding-bottom: 6px; margin-bottom: 8px; border-bottom: 2px solid var(--text);
      display: flex; justify-content: space-between; align-items: center;
    }
    .day-header .dow { color: var(--accent); }

    .event-row {
      background: var(--bg2); border: 1px solid var(--border);
      padding: 12px 14px; margin-bottom: 6px; display: flex; gap: 12px; align-items: flex-start;
    }
    .ev-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
    .ev-dot.high { background: #c0392b; }
    .ev-dot.medium { background: #c8a060; }
    .ev-dot.low { background: var(--muted); }
    .ev-body { flex: 1; }
    .ev-meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 3px; }
    .ev-title { font-size: 14px; font-weight: 700; color: var(--text); }
    .ev-desc { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
    .ev-values { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 5px; display: flex; gap: 12px; }

    .empty { text-align: center; padding: 50px 20px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 13px; }

    .footer { margin-top: 48px; padding: 20px 0; border-top: 1px solid var(--border); text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }
    .footer a { color: var(--muted); text-decoration: none; margin: 0 8px; }
  </style>
</head>
<body>

<header class="header">
  <a href="/" class="logo">News<span>Final</span></a>
  <div class="nav">
    <a href="/">홈</a> · <a href="/about.html">소개</a> · <a href="/archive.html">아카이브</a> · <a href="/calendar.html">경제 일정</a>
  </div>
</header>

<div class="container">
  <h1>경제 일정</h1>
  <div class="sub">프론티어 마켓 주요국 중앙은행 회의 · 선거 · 경제지표 발표 일정</div>

  <div class="filters">
    <select id="importance-filter" onchange="render()">
      <option value="">전체 중요도</option>
      <option value="high">🔴 높음만</option>
      <option value="medium">🟡 중간 이상</option>
    </select>
  </div>

  <div id="events-container"><div class="empty">불러오는 중...</div></div>
</div>

<footer class="footer">
  <div>NEWSFINAL © 2026</div>
  <div style="margin-top:6px;">
    <a href="/about.html">소개</a>
    <a href="/privacy.html">개인정보처리방침</a>
  </div>
</footer>

<script>
  const SUPABASE_URL = 'https://fotdngseksqaghvtcvqh.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_rT3kSEAAdM0DJlDW5fEWww_M37h6dDW';
  const DOW = ['일','월','화','수','목','금','토'];
  let allEvents = [];

  async function load() {
    try {
      const today = new Date().toISOString().slice(0, 10);
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/econ_events?select=*&event_date=gte.${today}&order=event_date.asc,event_time.asc&limit=200`,
        { headers: { 'apikey': SUPABASE_ANON_KEY } }
      );
      if (!res.ok) throw new Error();
      allEvents = await res.json();
      render();
    } catch(e) {
      document.getElementById('events-container').innerHTML = '<div class="empty">일정을 불러올 수 없습니다</div>';
    }
  }

  function render() {
    const filter = document.getElementById('importance-filter').value;
    let events = allEvents;
    if (filter === 'high') events = events.filter(e => e.importance === 'high');
    else if (filter === 'medium') events = events.filter(e => e.importance === 'high' || e.importance === 'medium');

    const container = document.getElementById('events-container');
    if (!events.length) {
      container.innerHTML = '<div class="empty">예정된 일정이 없습니다</div>';
      return;
    }

    // 날짜별 그룹화
    const byDate = {};
    events.forEach(ev => {
      if (!byDate[ev.event_date]) byDate[ev.event_date] = [];
      byDate[ev.event_date].push(ev);
    });

    container.innerHTML = Object.entries(byDate).map(([date, items]) => {
      const d = new Date(date + 'T00:00:00');
      const dateLabel = `${d.getMonth()+1}월 ${d.getDate()}일`;
      const dow = DOW[d.getDay()];

      return `
        <div class="day-group">
          <div class="day-header">
            <span>${dateLabel} <span class="dow">(${dow})</span></span>
          </div>
          ${items.map(ev => `
            <div class="event-row">
              <div class="ev-dot ${ev.importance || 'medium'}"></div>
              <div class="ev-body">
                <div class="ev-meta">${ev.event_time || ''} ${ev.country_flag || ''} ${ev.country || ''}</div>
                <div class="ev-title">${ev.title}</div>
                ${ev.description ? `<div class="ev-desc">${ev.description}</div>` : ''}
                ${(ev.previous_value || ev.forecast_value || ev.actual_value) ? `
                  <div class="ev-values">
                    ${ev.previous_value ? `<span>이전 ${ev.previous_value}</span>` : ''}
                    ${ev.forecast_value ? `<span>예상 ${ev.forecast_value}</span>` : ''}
                    ${ev.actual_value ? `<span>실제 ${ev.actual_value}</span>` : ''}
                  </div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }).join('');
  }

  load();
</script>

</body>
</html>
