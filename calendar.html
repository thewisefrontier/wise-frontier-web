<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <meta name="description" content="NewsFinal 경제 일정 — 프론티어 마켓 주요국 중앙은행 회의, 선거, 경제지표 발표 일정">
  <title>경제 일정 — NewsFinal</title>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7TKGYEM467"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7TKGYEM467');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8f6f1; --bg2: #ffffff; --bg3: #f0ede6;
      --border: #ddd9d0; --text: #1a1a1a; --muted: #888;
      --accent: #8b5e2a; --accent2: #1a5fa8; --red: #c0392b; --green: #1a7a3c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 14px; line-height: 1.6; }

    header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 24px; }
    .header-top {
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border); font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; color: var(--muted); background: var(--bg3);
      margin: 0 -24px; padding: 5px 24px; gap: 16px; line-height: 1.4;
    }
    .ticker-strip { display: flex; gap: 20px; overflow: hidden; flex: 1; }
    .ticker-item { display: flex; gap: 6px; align-items: center; white-space: nowrap; }
    .ticker-label { color: var(--muted); }
    .ticker-val { color: var(--text); font-weight: 500; }
    .up { color: var(--green); } .down { color: var(--red); }
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; white-space: nowrap; }

    .header-main {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0; border-bottom: 3px solid var(--text);
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900; letter-spacing: -1px; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }
    .header-meta { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); text-align: right; }

    nav.page-nav { display: flex; gap: 0; overflow-x: auto; background: var(--bg3); border-bottom: 1px solid var(--border); }
    nav.page-nav a {
      padding: 9px 14px; font-size: 12px; font-weight: 500; color: var(--muted);
      text-decoration: none; border-right: 1px solid var(--border); white-space: nowrap;
      transition: color 0.2s, background 0.2s;
    }
    nav.page-nav a:first-child { border-left: 1px solid var(--border); }
    nav.page-nav a:hover, nav.page-nav a.active { color: var(--accent2); background: var(--bg2); }

    .page-container { max-width: 800px; margin: 0 auto; padding: 28px 24px 60px; }
    h1.page-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; margin-bottom: 6px; color: var(--text); }
    .page-sub { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 24px; }

    .filters {
      display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;
      font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    }
    .filters select {
      padding: 7px 10px; border: 1px solid var(--border); background: var(--bg2);
      color: var(--text); font-family: inherit; font-size: 12px;
    }

    .day-group { margin-bottom: 22px; }
    .day-header {
      font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 700;
      color: var(--text); padding-bottom: 6px; margin-bottom: 8px; border-bottom: 2px solid var(--text);
      display: flex; justify-content: space-between; align-items: center;
    }
    .day-header .dow { color: var(--accent); }

    .event-row {
      background: var(--bg2); border: 1px solid var(--border);
      padding: 12px 14px; margin-bottom: 6px; display: flex; gap: 12px; align-items: flex-start;
    }
    .ev-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
    .ev-dot.high { background: var(--red); }
    .ev-dot.medium { background: var(--accent); }
    .ev-dot.low { background: var(--muted); }
    .ev-body { flex: 1; }
    .ev-meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 3px; }
    .ev-title { font-size: 14px; font-weight: 700; color: var(--text); }
    .ev-desc { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
    .ev-values { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 5px; display: flex; gap: 12px; }

    .empty { text-align: center; padding: 50px 20px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 13px; }

    footer {
      border-top: 1px solid var(--border); background: var(--bg2);
      padding: 24px; text-align: center; font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; color: var(--muted); margin-top: 0;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    @media (max-width: 600px) {
      header { padding: 0 14px; }
      .header-top { margin: 0 -14px; padding: 8px 14px; }
      .logo { font-size: 24px; }
      .page-container { padding: 20px 16px 40px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="ticker-strip" id="ticker"><span style="color:var(--muted)">시세 로딩 중...</span></div>
    <div class="header-right">
      <div id="datetime"></div>
    </div>
  </div>
  <div class="header-main">
    <a href="/" class="logo">News<span>Final</span></a>
    <div class="header-meta">프론티어 미디어</div>
  </div>
  <nav class="page-nav">
    <a href="/">홈</a>
    <a href="/archive.html">아카이브</a>
    <a href="/calendar.html" class="active">경제 일정</a>
    <a href="/markets.html">시장 지표</a>
    <a href="/country.html">국가별</a>
    <a href="/about.html">소개</a>
  </nav>
</header>

<div class="page-container">
  <h1 class="page-title">경제 일정</h1>
  <div class="page-sub">프론티어 마켓 주요국 중앙은행 회의 · 선거 · 경제지표 발표 일정</div>

  <div class="filters">
    <select id="importance-filter" onchange="render()">
      <option value="">전체 중요도</option>
      <option value="high">🔴 높음만</option>
      <option value="medium">🟡 중간 이상</option>
    </select>
  </div>

  <div id="events-container"><div class="empty">불러오는 중...</div></div>
</div>

<footer>
  <div>NEWSFINAL © 2026</div>
  <div style="margin-top:6px;">
    <a href="/about.html">소개</a> ·
    <a href="/archive.html">아카이브</a> ·
    <a href="/markets.html">시장 지표</a> ·
    <a href="/country.html">국가별</a> ·
    <a href="/privacy.html">개인정보처리방침</a> ·
    <a href="/terms.html">이용약관</a>
  </div>
  <div style="margin-top:6px;"><a href="https://t.me/TheWiseFrontier" style="color:var(--accent2);">텔레그램 채널 →</a></div>
</footer>

<script>
  const SUPABASE_URL = 'https://fotdngseksqaghvtcvqh.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_rT3kSEAAdM0DJlDW5fEWww_M37h6dDW';
  const DOW = ['일','월','화','수','목','금','토'];
  let allEvents = [];

  function pad(n) { return String(n).padStart(2, '0'); }
  function nowKST() {
    return new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
  }

  function updateDatetime() {
    const now = nowKST();
    const el = document.getElementById('datetime');
    if (el) el.textContent = `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())} KST`;
  }
  updateDatetime();
  setInterval(updateDatetime, 30000);

  async function loadMarketData() {
    try {
      const res = await fetch('data/market_data.json');
      if (!res.ok) return;
      const data = await res.json();
      const indices = data.indices || [];
      if (!indices.length) return;
      const ticker = document.getElementById('ticker');
      if (!ticker) return;
      ticker.innerHTML = indices.map(m => {
        const sign = m.change_pct >= 0 ? '+' : '';
        const cls = m.change_pct >= 0 ? 'up' : 'down';
        return `<span class="ticker-item"><span class="ticker-label">${m.name}</span><span class="ticker-val ${cls}">${m.price.toLocaleString()} ${sign}${m.change_pct.toFixed(2)}%</span></span>`;
      }).join('');
    } catch(e) {}
  }

  async function load() {
    try {
      const today = new Date().toISOString().slice(0, 10);
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/econ_events?select=*&event_date=gte.${today}&is_verified=eq.true&order=event_date.asc,event_time.asc&limit=200`,
        { headers: { 'apikey': SUPABASE_ANON_KEY } }
      );
      if (!res.ok) throw new Error();
      allEvents = await res.json();
      render();
    } catch(e) {
      document.getElementById('events-container').innerHTML = '<div class="empty">일정을 불러올 수 없습니다</div>';
    }
  }

  function render() {
    const filter = document.getElementById('importance-filter').value;
    let events = allEvents;
    if (filter === 'high') events = events.filter(e => e.importance === 'high');
    else if (filter === 'medium') events = events.filter(e => e.importance === 'high' || e.importance === 'medium');

    const container = document.getElementById('events-container');
    if (!events.length) {
      container.innerHTML = '<div class="empty">예정된 일정이 없습니다</div>';
      return;
    }

    const byDate = {};
    events.forEach(ev => {
      if (!byDate[ev.event_date]) byDate[ev.event_date] = [];
      byDate[ev.event_date].push(ev);
    });

    container.innerHTML = Object.entries(byDate).map(([date, items]) => {
      const d = new Date(date + 'T00:00:00');
      const dateLabel = `${d.getMonth()+1}월 ${d.getDate()}일`;
      const dow = DOW[d.getDay()];

      return `
        <div class="day-group">
          <div class="day-header">
            <span>${dateLabel} <span class="dow">(${dow})</span></span>
          </div>
          ${items.map(ev => `
            <div class="event-row">
              <div class="ev-dot ${ev.importance || 'medium'}"></div>
              <div class="ev-body">
                <div class="ev-meta">${ev.event_time || ''} ${ev.country_flag || ''} ${ev.country || ''}</div>
                <div class="ev-title">${ev.title}</div>
                ${ev.description ? `<div class="ev-desc">${ev.description}</div>` : ''}
                ${(ev.previous_value || ev.forecast_value || ev.actual_value) ? `
                  <div class="ev-values">
                    ${ev.previous_value ? `<span>이전 ${ev.previous_value}</span>` : ''}
                    ${ev.forecast_value ? `<span>예상 ${ev.forecast_value}</span>` : ''}
                    ${ev.actual_value ? `<span>실제 ${ev.actual_value}</span>` : ''}
                  </div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }).join('');
  }

  loadMarketData();
  load();
</script>

</body>
</html>
