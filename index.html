<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Wise Frontier — 프론티어 마켓 전문 미디어</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8f6f1;
      --bg2: #ffffff;
      --bg3: #f0ede6;
      --border: #ddd9d0;
      --text: #1a1a1a;
      --muted: #888;
      --accent: #8b5e2a;
      --accent2: #1a5fa8;
      --red: #c0392b;
      --green: #1a7a3c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }

    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      background: var(--bg3);
      margin: 0 -24px;
      padding: 8px 24px;
      gap: 16px;
    }

    .ticker-strip {
      display: flex;
      gap: 20px;
      overflow: hidden;
      flex: 1;
    }

    .ticker-item { display: flex; gap: 6px; align-items: center; white-space: nowrap; }
    .ticker-label { color: var(--muted); }
    .ticker-val { color: var(--text); font-weight: 500; }
    .up { color: var(--green); }
    .down { color: var(--red); }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      white-space: nowrap;
    }

    .header-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      border-bottom: 3px solid var(--text);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -1px;
      color: var(--text);
      text-decoration: none;
    }

    .logo span { color: var(--accent); }

    .header-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-align: right;
    }

    /* NAV - 두 줄 탭 */
    .nav-region {
      display: flex;
      gap: 0;
      overflow-x: auto;
      border-bottom: 1px solid var(--border);
    }

    .nav-sector {
      display: flex;
      gap: 0;
      overflow-x: auto;
      background: var(--bg3);
    }

    nav a {
      padding: 9px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      border-right: 1px solid var(--border);
      white-space: nowrap;
      transition: color 0.2s, background 0.2s;
    }

    nav a:first-child { border-left: 1px solid var(--border); }

    .nav-region a:hover, .nav-region a.active {
      color: var(--accent);
      background: var(--bg3);
    }

    .nav-sector a {
      font-size: 11px;
      padding: 7px 12px;
    }

    .nav-sector a:hover, .nav-sector a.active {
      color: var(--accent2);
      background: var(--bg2);
    }

    /* LAYOUT */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 24px;
    }

    /* FEED */
    .feed-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--text);
    }

    .feed-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .feed-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    /* CLUSTER */
    .cluster {
      margin-bottom: 16px;
      border: 1px solid var(--border);
      background: var(--bg2);
    }

    .cluster-header {
      background: var(--bg3);
      padding: 8px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
    }

    /* ARTICLE CARD */
    .article-card {
      border-left: 3px solid transparent;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-left-color 0.2s, background 0.2s;
      border-bottom: 1px solid var(--border);
    }

    .article-card:last-child { border-bottom: none; }

    .article-card:hover {
      border-left-color: var(--accent);
      background: var(--bg3);
    }

    /* 클러스터 없는 단독 카드 */
    .article-card.standalone {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      margin-bottom: 10px;
    }

    .article-card.standalone:hover {
      border-left-color: var(--accent);
    }

    .article-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .article-tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      padding: 2px 7px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--bg3);
    }

    .tag.country {
      border-color: var(--accent);
      color: var(--accent);
    }

    .article-time {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
    }

    .article-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 5px;
    }

    .article-summary {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 7px;
    }

    .article-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .article-source {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .article-link {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--accent2);
      text-decoration: none;
    }

    .article-link:hover { text-decoration: underline; }

    /* SIDEBAR */
    .sidebar { display: flex; flex-direction: column; gap: 16px; }

    .widget {
      background: var(--bg2);
      border: 1px solid var(--border);
    }

    .widget-header {
      padding: 10px 14px;
      border-bottom: 2px solid var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text);
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      font-weight: 500;
    }

    .wire-item {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 8px 1fr;
      gap: 8px;
      align-items: start;
      transition: background 0.2s;
    }

    .wire-item:hover { background: var(--bg3); }
    .wire-item:last-child { border-bottom: none; }

    .wire-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      margin-top: 5px;
    }

    .wire-dot.new { background: var(--red); animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .wire-text {
      font-size: 12px;
      color: var(--text);
      line-height: 1.4;
    }

    .wire-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
    }

    .briefing-item {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }

    .briefing-item:last-child { border-bottom: none; }

    .briefing-region {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }

    .briefing-title {
      font-size: 12px;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 2px;
    }

    .briefing-title a { color: inherit; text-decoration: none; }
    .briefing-title a:hover { color: var(--accent); }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      gap: 8px;
    }

    .loading::before {
      content: '';
      width: 12px;
      height: 12px;
      border: 1px solid var(--accent);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      padding: 30px;
      text-align: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    footer {
      border-top: 2px solid var(--text);
      background: var(--bg2);
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 40px;
    }

    .live-indicator { display: flex; align-items: center; gap: 6px; }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 1.5s infinite;
    }

    @media (max-width: 900px) {
      .container { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="ticker-strip" id="ticker">
      <span style="color:var(--muted)">시세 로딩 중...</span>
    </div>
    <div class="header-right">
      <div id="datetime"></div>
      <div id="market-updated" style="font-size:10px;color:var(--muted);"></div>
    </div>
  </div>

  <div class="header-main">
    <a href="/" class="logo">The Wise <span>Frontier</span></a>
    <div class="header-meta">
      프론티어 마켓 전문 미디어<br>
      AFRICA · SOUTHEAST ASIA · EASTERN EUROPE
    </div>
  </div>

  <!-- 지역 탭 -->
  <nav class="nav-region" id="nav-region">
    <a href="#" class="active" onclick="filterRegion('all', this); return false;">전체</a>
    <a href="#" onclick="filterRegion('아프리카', this); return false;">아프리카</a>
    <a href="#" onclick="filterRegion('동남아시아', this); return false;">동남아시아</a>
    <a href="#" onclick="filterRegion('동유럽', this); return false;">동유럽</a>
    <a href="#" onclick="filterRegion('중동', this); return false;">중동</a>
    <a href="#" onclick="filterRegion('중앙아시아', this); return false;">중앙아시아</a>
    <a href="#" onclick="filterRegion('남아시아', this); return false;">남아시아</a>
    <a href="#" onclick="filterRegion('카리브해', this); return false;">카리브해</a>
    <a href="#" onclick="filterRegion('라틴아메리카', this); return false;">라틴아메리카</a>
    <a href="#" onclick="filterRegion('오세아니아', this); return false;">오세아니아</a>
  </nav>

  <!-- 분야 탭 -->
  <nav class="nav-sector" id="nav-sector">
    <a href="#" class="active" onclick="filterSector('all', this); return false;">전체분야</a>
    <a href="#" onclick="filterSector('경제', this); return false;">경제</a>
    <a href="#" onclick="filterSector('금융/증권', this); return false;">금융/증권</a>
    <a href="#" onclick="filterSector('자원/에너지', this); return false;">자원/에너지</a>
    <a href="#" onclick="filterSector('산업/기업', this); return false;">산업/기업</a>
    <a href="#" onclick="filterSector('정치', this); return false;">정치</a>
    <a href="#" onclick="filterSector('사회', this); return false;">사회</a>
    <a href="#" onclick="filterSector('IT·과학', this); return false;">IT·과학</a>
    <a href="#" onclick="filterSector('글로벌경제', this); return false;">글로벌경제</a>
  </nav>
</header>

<div class="container">
  <main>
    <div class="feed-header">
      <span class="feed-title">● LIVE FEED</span>
      <span class="feed-count" id="article-count">로딩 중...</span>
    </div>
    <div id="articles-container">
      <div class="loading">기사 데이터 로딩 중</div>
    </div>
  </main>

  <aside class="sidebar">
    <div class="widget">
      <div class="widget-header">
        <span>● WIRE</span>
        <span id="wire-time"></span>
      </div>
      <div id="wire-container">
        <div class="loading">로딩 중</div>
      </div>
    </div>

    <div class="widget">
      <div class="widget-header">
        <span>오늘의 브리핑</span>
        <span id="briefing-date"></span>
      </div>
      <div id="briefing-container">
        <div class="empty">데이터 준비 중</div>
      </div>
    </div>
  </aside>
</div>

<footer>
  <div class="live-indicator">
    <div class="live-dot"></div>
    <span>LIVE — 30분마다 업데이트</span>
  </div>
  <div>THE WISE FRONTIER © 2026</div>
  <div>
    <a href="https://t.me/TheWiseFrontier" style="color: var(--accent2); text-decoration: none;">텔레그램 채널 →</a>
  </div>
</footer>

<script>
  // 시간 업데이트
  function updateTime() {
    const now = new Date();
    document.getElementById('datetime').textContent = now.toLocaleString('ko-KR', {
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Seoul'
    }) + ' KST';
    document.getElementById('wire-time').textContent = now.toLocaleTimeString('ko-KR', {
      hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Seoul'
    });
  }
  updateTime();
  setInterval(updateTime, 60000);

  document.getElementById('briefing-date').textContent = new Date().toLocaleDateString('ko-KR', { month: 'long', day: 'numeric' });

  // 상대 시간 계산
  function formatTime(dateStr) {
    if (!dateStr) return '';
    const date = new Date(dateStr);
    const now = new Date();
    const diff = Math.floor((now - date) / 60000);
    if (diff < 1) return '방금 전';
    if (diff < 60) return `${diff}분 전`;
    if (diff < 1440) return `${Math.floor(diff/60)}시간 전`;
    return date.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
  }

  // 1분마다 기사 시간 자동 업데이트
  function refreshTimes() {
    document.querySelectorAll('[data-created]').forEach(el => {
      el.textContent = formatTime(el.getAttribute('data-created'));
    });
  }
  setInterval(refreshTimes, 60000);

  let allArticles = [];
  let currentRegion = 'all';
  let currentSector = 'all';

  // 클러스터링 — 비슷한 기사 묶기
  function clusterArticles(articles) {
    const clusters = [];
    const used = new Set();

    articles.forEach((a, i) => {
      if (used.has(i)) return;

      const words = getKeywords(a.title_en || a.title_ko || '');
      const group = [a];
      used.add(i);

      articles.forEach((b, j) => {
        if (i === j || used.has(j)) return;
        const bWords = getKeywords(b.title_en || b.title_ko || '');
        const overlap = words.filter(w => bWords.includes(w)).length;
        if (overlap >= 2) {
          group.push(b);
          used.add(j);
        }
      });

      clusters.push(group);
    });

    return clusters;
  }

  function getKeywords(title) {
    const stopwords = ['the', 'a', 'an', 'in', 'on', 'at', 'to', 'for', 'of', 'and', 'or', 'is', 'are', 'was', 'as', 'by', 'with', '이', '가', '을', '를', '의', '에', '은', '는'];
    return title.toLowerCase()
      .replace(/[^a-zA-Z0-9가-힣 ]/g, '')
      .split(' ')
      .filter(w => w.length > 3 && !stopwords.includes(w));
  }

  function renderArticles(articles) {
    const container = document.getElementById('articles-container');
    document.getElementById('article-count').textContent = `총 ${articles.length}건`;

    if (!articles.length) {
      container.innerHTML = '<div class="empty">해당 기사가 없습니다.</div>';
      return;
    }

    const clusters = clusterArticles(articles);
    let html = '';

    clusters.forEach(group => {
      if (group.length >= 2) {
        // 클러스터 (2개 이상 묶인 기사)
        const topic = group[0].title_ko || group[0].title_en || '';
        html += `
          <div class="cluster">
            <div class="cluster-header">
              <span>📌 관련 기사 ${group.length}건</span>
              <span>${formatTime(group[0].created_at)}</span>
            </div>
            ${group.map(a => renderCard(a, false)).join('')}
          </div>
        `;
      } else {
        // 단독 기사
        html += renderCard(group[0], true);
      }
    });

    container.innerHTML = html;
  }

  function renderCard(a, standalone) {
    return `
      <div class="article-card ${standalone ? 'standalone' : ''}" onclick="window.open('${a.url}', '_blank')">
        <div class="article-header">
          <div class="article-tags">
            <span class="tag">${a.category || ''}</span>
            ${a.subcategory && a.subcategory !== a.category ? `<span class="tag">${a.subcategory}</span>` : ''}
            ${a.country ? `<span class="tag country">${a.country}</span>` : ''}
          </div>
          <span class="article-time" data-created="${a.created_at}">${formatTime(a.created_at)}</span>
        </div>
        <div class="article-title">${a.title_ko || a.title_en}</div>
        ${a.summary_ko ? `<div class="article-summary">${a.summary_ko}</div>` : ''}
        <div class="article-footer">
          <span class="article-source">📎 ${a.source}</span>
          <a class="article-link" href="${a.url}" target="_blank" onclick="event.stopPropagation()">원문 보기 →</a>
        </div>
      </div>
    `;
  }

  function renderWire(articles) {
    const container = document.getElementById('wire-container');
    if (!articles.length) { container.innerHTML = '<div class="empty">준비 중</div>'; return; }
    container.innerHTML = articles.map((a, i) => `
      <div class="wire-item">
        <div class="wire-dot ${i < 2 ? 'new' : ''}"></div>
        <div>
          <div class="wire-text">
            <a href="${a.url}" target="_blank" style="color:inherit;text-decoration:none;">${a.title_ko || a.title_en}</a>
          </div>
          <div class="wire-meta" data-created="${a.created_at}">${a.source} · ${formatTime(a.created_at)}</div>
        </div>
      </div>
    `).join('');
  }

  function renderBriefing(articles) {
    const container = document.getElementById('briefing-container');
    const regions = {};
    articles.forEach(a => {
      const r = a.subcategory || a.region || '기타';
      if (!regions[r]) regions[r] = [];
      if (regions[r].length < 3) regions[r].push(a);
    });
    const html = Object.entries(regions).slice(0, 5).map(([region, items]) => `
      <div class="briefing-item">
        <div class="briefing-region">${region.toUpperCase()}</div>
        ${items.map(a => `
          <div class="briefing-title"><a href="${a.url}" target="_blank">· ${a.title_ko || a.title_en}</a></div>
        `).join('')}
      </div>
    `).join('');
    container.innerHTML = html || '<div class="empty">브리핑 준비 중</div>';
  }

  function getFiltered() {
    return allArticles.filter(a => {
      const regionMatch = currentRegion === 'all' || a.subcategory === currentRegion || a.region === currentRegion;
      const sectorMatch = currentSector === 'all' || a.category === currentSector || a.subcategory === currentSector;
      return regionMatch && sectorMatch;
    });
  }

  function filterRegion(region, el) {
    document.querySelectorAll('.nav-region a').forEach(a => a.classList.remove('active'));
    el.classList.add('active');
    currentRegion = region;
    renderArticles(getFiltered());
  }

  function filterSector(sector, el) {
    document.querySelectorAll('.nav-sector a').forEach(a => a.classList.remove('active'));
    el.classList.add('active');
    currentSector = sector;
    renderArticles(getFiltered());
  }

  // 시세 로드
  async function loadMarketData() {
    try {
      const res = await fetch('data/market_data.json');
      if (!res.ok) throw new Error('No market data');
      const data = await res.json();
      const ticker = document.getElementById('ticker');
      ticker.innerHTML = data.indices.map(item => `
        <div class="ticker-item">
          <span class="ticker-label">${item.name}</span>
          <span class="ticker-val">${Number(item.price).toLocaleString()}</span>
          <span class="${item.up ? 'up' : 'down'}">${item.up ? '+' : ''}${Number(item.change_pct).toFixed(2)}%</span>
        </div>
      `).join('');
      if (data.updated_at) {
        document.getElementById('market-updated').textContent = `업데이트: ${data.updated_at}`;
      }
    } catch (e) {
      document.getElementById('ticker').innerHTML = '<span style="color:var(--muted)">시세 준비 중</span>';
    }
  }

  // 기사 로드
  async function loadArticles() {
    try {
      const res = await fetch('data/articles.json');
      if (!res.ok) throw new Error('No data');
      allArticles = await res.json();
      renderArticles(allArticles);
      renderWire(allArticles.slice(0, 10));
      renderBriefing(allArticles);
    } catch (e) {
      document.getElementById('articles-container').innerHTML = `<div class="empty">아직 기사 데이터가 없습니다.<br>곧 업데이트됩니다.</div>`;
      document.getElementById('wire-container').innerHTML = '<div class="empty">준비 중</div>';
    }
  }

  loadMarketData();
  loadArticles();
</script>

</body>
</html>
