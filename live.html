<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <meta name="description" content="NewsFinal 라이브 — 계속 업데이트되는 프론티어 마켓 주요 이슈">
  <title>라이브 — NewsFinal</title>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7TKGYEM467"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7TKGYEM467');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8f6f1; --bg2: #ffffff; --bg3: #f0ede6;
      --border: #ddd9d0; --text: #1a1a1a; --muted: #888;
      --accent: #8b5e2a; --accent2: #1a5fa8; --red: #c0392b; --green: #1a7a3c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 14px; line-height: 1.6; }

    header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 24px; }
    .header-top {
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border); font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; color: var(--muted); background: var(--bg3);
      margin: 0 -24px; padding: 5px 24px; gap: 16px; line-height: 1.4;
    }
    .ticker-strip { display: flex; gap: 18px; overflow: hidden; flex: 1; }
    .ticker-item { display: flex; gap: 5px; align-items: center; white-space: nowrap; }
    .ticker-label { color: var(--muted); }
    .ticker-val { color: var(--text); font-weight: 500; }
    .up { color: var(--green); } .down { color: var(--red); }
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; white-space: nowrap; }

    .header-main {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0; border-bottom: 3px solid var(--text);
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900; letter-spacing: -1px; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }
    .header-meta { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); text-align: right; }

    nav.page-nav { display: flex; gap: 0; overflow-x: auto; background: var(--bg3); border-bottom: 1px solid var(--border); }
    nav.page-nav a {
      padding: 9px 14px; font-size: 12px; font-weight: 500; color: var(--muted);
      text-decoration: none; border-right: 1px solid var(--border); white-space: nowrap;
      transition: color 0.2s, background 0.2s;
    }
    nav.page-nav a:first-child { border-left: 1px solid var(--border); }
    nav.page-nav a:hover, nav.page-nav a.active { color: var(--accent2); background: var(--bg2); }

    .page-container { max-width: 760px; margin: 0 auto; padding: 28px 24px 60px; }

    .page-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .live-dot {
      width: 10px; height: 10px; border-radius: 50%; background: var(--red);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(192,57,43,0.5); }
      50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(192,57,43,0); }
    }
    h1.page-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; color: var(--text); }
    .page-sub { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 24px; }

    .live-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-left: 3px solid var(--red); padding: 16px 18px;
      margin-bottom: 12px; cursor: pointer; transition: background 0.2s;
    }
    .live-card:hover { background: var(--bg3); }
    .live-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 700;
      color: var(--red); letter-spacing: 0.05em; margin-bottom: 8px;
    }
    .live-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); }
    .live-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
    .tag { font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 2px 7px; border: 1px solid var(--border); color: var(--muted); background: var(--bg3); }
    .tag.country { border-color: var(--accent); color: var(--accent); }
    .live-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
    .live-preview { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 8px; }
    .live-meta {
      font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted);
      display: flex; gap: 14px; flex-wrap: wrap; padding-top: 8px; border-top: 1px solid var(--border);
    }
    .live-meta strong { color: var(--text); font-weight: 700; }

    .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 13px; }

    footer {
      border-top: 1px solid var(--border); background: var(--bg2);
      padding: 24px; text-align: center; font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; color: var(--muted); margin-top: 0;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    @media (max-width: 600px) {
      header { padding: 0 14px; }
      .header-top { margin: 0 -14px; padding: 5px 14px; }
      .logo { font-size: 24px; }
      .page-container { padding: 20px 16px 40px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="ticker-strip" id="ticker"><span style="color:var(--muted)">시세 로딩 중...</span></div>
    <div class="header-right">
      <div id="datetime"></div>
    </div>
  </div>
  <div class="header-main">
    <a href="/" class="logo">News<span>Final</span></a>
    <div class="header-meta">프론티어 미디어</div>
  </div>
  <nav class="page-nav">
    <a href="/">홈</a>
    <a href="/live.html" class="active">🔴 라이브</a>
    <a href="/archive.html">아카이브</a>
    <a href="/calendar.html">경제 일정</a>
    <a href="/markets.html">시장 지표</a>
    <a href="/country.html">국가별</a>
    <a href="/about.html">소개</a>
  </nav>
</header>

<div class="page-container">
  <div class="page-title-row">
    <span class="live-dot"></span>
    <h1 class="page-title">라이브</h1>
  </div>
  <div class="page-sub">계속 업데이트되는 프론티어 마켓 주요 이슈 — 최신 업데이트 순</div>

  <div id="live-container"><div class="empty">불러오는 중...</div></div>
</div>

<footer>
  <div>NEWSFINAL © 2026</div>
  <div style="margin-top:6px;">
    <a href="/about.html">소개</a> ·
    <a href="/archive.html">아카이브</a> ·
    <a href="/calendar.html">경제 일정</a> ·
    <a href="/markets.html">시장 지표</a> ·
    <a href="/country.html">국가별</a> ·
    <a href="/privacy.html">개인정보처리방침</a> ·
    <a href="/terms.html">이용약관</a>
  </div>
  <div style="margin-top:6px;"><a href="https://t.me/TheWiseFrontier" style="color:var(--accent2);">텔레그램 채널 →</a></div>
</footer>

<script>
  function pad(n) { return String(n).padStart(2, '0'); }
  function nowKST() {
    return new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
  }
  function updateDatetime() {
    const now = nowKST();
    const el = document.getElementById('datetime');
    if (el) el.textContent = `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())} KST`;
  }
  updateDatetime();
  setInterval(updateDatetime, 30000);

  async function loadTicker() {
    try {
      const res = await fetch('data/market_data.json');
      if (!res.ok) return;
      const data = await res.json();
      const indices = data.indices || [];
      if (!indices.length) return;
      const ticker = document.getElementById('ticker');
      if (!ticker) return;
      ticker.innerHTML = indices.map(m => {
        const sign = m.change_pct >= 0 ? '+' : '';
        const cls = m.change_pct >= 0 ? 'up' : 'down';
        return `<span class="ticker-item"><span class="ticker-label">${m.name}</span><span class="ticker-val ${cls}">${m.price.toLocaleString()} ${sign}${m.change_pct.toFixed(2)}%</span></span>`;
      }).join('');
    } catch(e) {}
  }

  const REGION_KO = {
    'africa': '아프리카', 'southeast_asia': '동남아시아',
    'eastern_europe': '동유럽', 'middle_east': '중동',
    'central_asia': '중앙아시아', 'south_asia': '남아시아',
    'latin_america': '라틴아메리카', 'caribbean': '카리브해',
    'oceania': '오세아니아', 'global': '글로벌',
  };

  function cleanBody(text) {
    if (!text) return '';
    return text
      .replace(/\*\*(.+?)\*\*/g, '$1')
      .replace(/\*(.+?)\*/g, '$1')
      .replace(/^#{1,6}\s+/gm, '')
      .replace(/\[.{1,20}=.{1,30}\]/g, '')
      .replace(/^\[.{1,30}\]\s*/gm, '')
      .trim();
  }

  function formatDateTime(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr.replace(' ', 'T'));
    if (isNaN(d)) return dateStr;
    return `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  async function load() {
    try {
      const res = await fetch('data/articles.json');
      if (!res.ok) throw new Error();
      const articles = await res.json();

      // 라이브 기준: NewsFinal 자체 기사 + score(병합 누적 건수) 2 이상 = 여러 번 갱신된 진행형 이슈
      // 다이제스트(digest_)는 라이브 대상에서 제외
      const liveArticles = articles
        .filter(a =>
          a.source === 'NewsFinal' &&
          a.is_published !== false &&
          (a.score || 0) >= 2 &&
          !(a.subcategory || '').startsWith('digest_')
        )
        .sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));

      render(liveArticles);
    } catch(e) {
      document.getElementById('live-container').innerHTML = '<div class="empty">라이브 이슈를 불러올 수 없습니다</div>';
    }
  }

  function render(articles) {
    const container = document.getElementById('live-container');
    if (!articles.length) {
      container.innerHTML = '<div class="empty">현재 진행 중인 라이브 이슈가 없습니다.<br>여러 차례 업데이트된 기사가 생기면 이곳에 표시됩니다.</div>';
      return;
    }

    container.innerHTML = articles.map(a => {
      const title = a.title_ko || a.title_en;
      const preview = cleanBody(a.summary_ko || '').slice(0, 120);
      const catTag = a.category ? `<span class="tag">${a.category}</span>` : '';
      const regionTag = a.region ? `<span class="tag">${REGION_KO[a.region] || a.region}</span>` : '';
      const countries = a.countries && a.countries.length ? a.countries : (a.country ? [a.country] : []);
      const countryTags = [...new Set(countries)].filter(c=>c).map(c => `<span class="tag country">${c}</span>`).join('');

      const firstPub = a.first_published_at ? formatDateTime(a.first_published_at) : formatDateTime(a.created_at);
      const lastUpdate = formatDateTime(a.created_at);
      const updateCount = a.score || 0;

      return `
        <div class="live-card" onclick="location.href='article.html?id=${a.id}'">
          <div class="live-badge"><span class="dot"></span>LIVE · ${updateCount}차 업데이트</div>
          <div class="live-tags">${catTag}${regionTag}${countryTags}</div>
          <div class="live-title">${title}</div>
          <div class="live-preview">${preview}${preview.length >= 120 ? '…' : ''}</div>
          <div class="live-meta">
            <span>최초 게시: ${firstPub}</span>
            <span>최종 업데이트: <strong>${lastUpdate}</strong></span>
          </div>
        </div>`;
    }).join('');
  }

  loadTicker();
  load();
</script>

</body>
</html>
