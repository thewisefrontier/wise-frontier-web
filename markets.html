<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <meta name="description" content="NewsFinal 시장 지표 — 미국, 한국, 아프리카·프론티어 마켓 주요 지수 및 환율">
  <title>시장 지표 — NewsFinal</title>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7TKGYEM467"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7TKGYEM467');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8f6f1; --bg2: #ffffff; --bg3: #f0ede6;
      --border: #ddd9d0; --text: #1a1a1a; --muted: #888;
      --accent: #8b5e2a; --accent2: #1a5fa8; --red: #c0392b; --green: #1a7a3c;
      --up: var(--green); --down: var(--red);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 14px; line-height: 1.6; }

    header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 24px; }
    .header-top {
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border); font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; color: var(--muted); background: var(--bg3);
      margin: 0 -24px; padding: 8px 24px; gap: 16px;
    }
    .ticker-strip { display: flex; gap: 20px; overflow: hidden; flex: 1; }
    .ticker-item { display: flex; gap: 6px; align-items: center; white-space: nowrap; }
    .ticker-label { color: var(--muted); }
    .ticker-val { color: var(--text); font-weight: 500; }
    .up { color: var(--green); } .down { color: var(--red); }
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; white-space: nowrap; }

    .header-main {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0; border-bottom: 3px solid var(--text);
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900; letter-spacing: -1px; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }
    .header-meta { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); text-align: right; }

    nav.page-nav { display: flex; gap: 0; overflow-x: auto; background: var(--bg3); border-bottom: 1px solid var(--border); }
    nav.page-nav a {
      padding: 9px 14px; font-size: 12px; font-weight: 500; color: var(--muted);
      text-decoration: none; border-right: 1px solid var(--border); white-space: nowrap;
      transition: color 0.2s, background 0.2s;
    }
    nav.page-nav a:first-child { border-left: 1px solid var(--border); }
    nav.page-nav a:hover, nav.page-nav a.active { color: var(--accent2); background: var(--bg2); }

    .page-container { max-width: 800px; margin: 0 auto; padding: 28px 24px 60px; }
    h1.page-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; margin-bottom: 6px; color: var(--text); }
    .page-sub { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 28px; }

    .group { margin-bottom: 28px; }
    .group-header {
      font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 700;
      color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase;
      padding-bottom: 6px; margin-bottom: 10px; border-bottom: 2px solid var(--text);
    }
    .index-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
    .index-card { background: var(--bg2); border: 1px solid var(--border); padding: 12px 14px; }
    .index-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .index-price { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 700; }
    .index-change { font-family: 'IBM Plex Mono', monospace; font-size: 12px; margin-top: 3px; }
    .index-change.up { color: var(--up); }
    .index-change.down { color: var(--down); }

    .empty { text-align: center; padding: 50px 20px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
    .source-note { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 24px; text-align: center; }

    footer {
      border-top: 1px solid var(--border); background: var(--bg2);
      padding: 24px; text-align: center; font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; color: var(--muted); margin-top: 0;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    @media (max-width: 600px) {
      header { padding: 0 14px; }
      .header-top { margin: 0 -14px; padding: 8px 14px; }
      .logo { font-size: 24px; }
      .page-container { padding: 20px 16px 40px; }
      .index-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="ticker-strip" id="ticker"><span style="color:var(--muted)">시세 로딩 중...</span></div>
    <div class="header-right">
      <div id="datetime"></div>
    </div>
  </div>
  <div class="header-main">
    <a href="/" class="logo">News<span>Final</span></a>
    <div class="header-meta">프론티어 미디어</div>
  </div>
  <nav class="page-nav">
    <a href="/">홈</a>
    <a href="/archive.html">아카이브</a>
    <a href="/calendar.html">경제 일정</a>
    <a href="/markets.html" class="active">시장 지표</a>
    <a href="/country.html">국가별</a>
    <a href="/about.html">소개</a>
  </nav>
</header>

<div class="page-container">
  <h1 class="page-title">시장 지표</h1>
  <div class="page-sub" id="updated-at">불러오는 중...</div>

  <div id="markets-container"><div class="empty">시장 데이터를 불러오는 중입니다...</div></div>

  <div class="source-note">데이터 출처: Yahoo Finance · 약 2시간 간격 갱신 · 투자 참고용이며 실시간 시세와 차이가 있을 수 있습니다</div>
</div>

<footer>
  <div>NEWSFINAL © 2026</div>
  <div style="margin-top:6px;">
    <a href="/about.html">소개</a> ·
    <a href="/archive.html">아카이브</a> ·
    <a href="/calendar.html">경제 일정</a> ·
    <a href="/country.html">국가별</a> ·
    <a href="/privacy.html">개인정보처리방침</a> ·
    <a href="/terms.html">이용약관</a>
  </div>
  <div style="margin-top:6px;"><a href="https://t.me/TheWiseFrontier" style="color:var(--accent2);">텔레그램 채널 →</a></div>
</footer>

<script>
  function pad(n) { return String(n).padStart(2, '0'); }
  function updateDatetime() {
    const now = new Date();
    const el = document.getElementById('datetime');
    if (el) el.textContent = `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())} KST`;
  }
  updateDatetime();
  setInterval(updateDatetime, 30000);

  const GROUP_LABELS = {
    us: '🇺🇸 미국',
    kr: '🇰🇷 한국',
    frontier: '🌍 아프리카 · 프론티어 마켓',
    fx: '💱 환율',
  };
  const GROUP_ORDER = ['us', 'kr', 'frontier', 'fx'];

  function renderGroup(key, items) {
    if (!items || !items.length) return '';
    return `
      <div class="group">
        <div class="group-header">${GROUP_LABELS[key] || key}</div>
        <div class="index-grid">
          ${items.map(m => {
            const sign = m.change_pct >= 0 ? '+' : '';
            const cls = m.change_pct >= 0 ? 'up' : 'down';
            const arrow = m.change_pct >= 0 ? '▲' : '▼';
            return `
              <div class="index-card">
                <div class="index-name">${m.name}</div>
                <div class="index-price">${m.price.toLocaleString()}</div>
                <div class="index-change ${cls}">${arrow} ${sign}${m.change_pct.toFixed(2)}%</div>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  async function loadTicker() {
    try {
      const res = await fetch('data/market_data.json');
      if (!res.ok) return;
      const data = await res.json();
      const indices = data.indices || [];
      if (!indices.length) return;
      const ticker = document.getElementById('ticker');
      if (!ticker) return;
      ticker.innerHTML = indices.map(m => {
        const sign = m.change_pct >= 0 ? '+' : '';
        const cls = m.change_pct >= 0 ? 'up' : 'down';
        return `<span class="ticker-item"><span class="ticker-label">${m.name}</span><span class="ticker-val ${cls}">${m.price.toLocaleString()} ${sign}${m.change_pct.toFixed(2)}%</span></span>`;
      }).join('');
    } catch(e) {}
  }

  async function load() {
    try {
      const res = await fetch('data/market_data.json');
      if (!res.ok) throw new Error();
      const data = await res.json();

      document.getElementById('updated-at').textContent = `기준: ${data.updated_at || ''}`;

      const groups = data.groups || {};
      let html = '';
      let hasAny = false;
      GROUP_ORDER.forEach(key => {
        const g = renderGroup(key, groups[key]);
        if (g) { html += g; hasAny = true; }
      });

      if (!hasAny && data.indices && data.indices.length) {
        html = renderGroup('frontier', data.indices);
      }

      document.getElementById('markets-container').innerHTML = html || '<div class="empty">표시할 시장 데이터가 없습니다</div>';
    } catch(e) {
      document.getElementById('markets-container').innerHTML = '<div class="empty">시장 데이터를 불러올 수 없습니다</div>';
    }
  }

  loadTicker();
  load();
</script>

</body>
</html>
